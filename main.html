<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sant-Petersburg</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <h1 class="logo">Достопримечательности Санкт-Петербурга</h1>
        </header>

        <main class="grid-container">
            
            <div href="hermitage.html" class="card large"  onclick="window.location.href='hermitage.html'">
                <img src="img/img1.png" alt="Эрмитаж">
                <div class="overlay"><h3>Эрмитаж</h3></div>
            </div>
            
            <div class="card large">
                <img src="img/img2.png" alt="Исаакиевский собор">
                <div class="overlay"><h3>Исаакиевский собор</h3></div>
            </div>

            <div class="card small">
                <img src="img/img3.png" alt="Спас на Крови">
                <div class="overlay"><h4>Спас на Крови</h4></div>
            </div>

            <div class="card small">
                <img src="img/img4.png" alt="Казанский собор">
                <div class="overlay"><h4>Казанский собор</h4></div>
            </div>

            <div class="card small">
                <img src="img/img5.png" alt="Крейсер Аврора">
                <div class="overlay"><h4>Аврора</h4></div>
            </div>

            <div class="card small">
                <img src="img/img6.png" alt="Петергоф">
                <div class="overlay"><h4>Петергоф</h4></div>
            </div>

        </main>

        <footer class="footer"><p>© 2026 Санкт-Петербург</p></footer>
    </div>
</body>
</html>
